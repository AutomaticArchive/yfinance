name: Update Dependencies

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project-code

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: '.'

      - name: Mask Sensitive Tokens and Environment Setup
        working-directory: .
        run: |
          echo "::add-mask::${{ secrets.UPDATE_MIRROR_URL }}"

      - name: Clone Project
        working-directory: .
        run: |
          git clone "${{ secrets.UPDATE_MIRROR_URL }}" project-code

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Upgrade lockfile
        run: uv lock --upgrade > /dev/null 2>&1

      - name: Install dependencies
        run: uv sync > /dev/null 2>&1

      - name: Run tests
        run: uv run pytest tests/ > /dev/null 2>&1

      - name: Commit updated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git diff --staged --quiet || \
            (git commit -m "chore: update dependencies" && git push > /dev/null 2>&1)
